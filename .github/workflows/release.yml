name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x64
          - os: windows-latest
            name: windows-x64
          - os: macos-latest
            name: macos-arm64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v5

      - name: Determine version
        id: version
        shell: bash
        run: |
          VER="${GITHUB_REF#refs/tags/v}"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcups2-dev

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'

      - name: Configure
        run: cmake -B build -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Release "-DAPP_VERSION=${{ steps.version.outputs.version }}"

      - name: Build
        run: cmake --build build --config Release

      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: cd build && QT_QPA_PLATFORM=offscreen ctest -V

      - name: Test (non-Linux)
        if: runner.os != 'Linux'
        run: cd build && ctest -V -C Release

      - name: Install linuxdeployqt (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage -O linuxdeployqt
          chmod +x linuxdeployqt

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp build/ymind dist/
          chmod +x dist/ymind
          ./linuxdeployqt dist/ymind -verbose=1
          tar czf ymind-${{ matrix.name }}.tar.gz -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp build/Release/ymind.exe dist/
          windeployqt dist/ymind.exe || true
          7z a ymind-${{ matrix.name }}.zip ./dist/*

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist/YMind.app/Contents/MacOS
          cp build/ymind dist/YMind.app/Contents/MacOS/
          chmod +x dist/YMind.app/Contents/MacOS/ymind
          macdeployqt dist/YMind.app -verbose=1
          tar czf ymind-${{ matrix.name }}.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ymind-${{ matrix.name }}
          path: ymind-${{ matrix.name }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release delete "${{ github.ref_name }}" --yes || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
